            var i = indices[name];
            var segments = segments_all[name];
            var distances = distances_all[name];

            if (i >= segments.length) continue;

            finished = false;

            var s = segments[i];
            var edge = JSON.stringify(s.edge);

            used_global[edge] = (used_global[edge] || 0) + 1;

            var color = (used_global[edge] > 1) ? "red" : s.color;

            L.polyline([s.p1, s.p2], {
                color: color,
                weight: 5,
                opacity: 0.85
            }).addTo(layers[name]);

            // 🔥 COMPTEUR DISTANCE RESTAURÉ
            document.getElementById("dist_" + name).innerHTML =
                "Distance : " + Math.round(distances[i + 1]) + " m";

            indices[name] += 1;
        }

        if (finished) {
            clearInterval(timer);
        }
    }

    var timer = setInterval(draw, 40);
}

if (document.readyState !== 'loading') {
    initAnimation();
} else {
    document.addEventListener('DOMContentLoaded', initAnimation);
}

</script>
